services:
  forecast-service:
    build: .
    container_name: ecosaude-forecast-service
    ports:
      - "8000:8000"
    environment:
      SATELLITE_API_KEY: ${SATELLITE_API_KEY}
      CLIMATE_API_KEY: ${CLIMATE_API_KEY}
      DATABASE_URL: ${DATABASE_URL}
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

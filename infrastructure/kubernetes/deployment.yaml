apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecosaude-forecast-service
  namespace: ecosaude
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecosaude-forecast-service
  template:
    metadata:
      labels:
        app: ecosaude-forecast-service
    spec:
      serviceAccountName: ecosaude-forecast-sa
      containers:
        - name: forecast-service
          image: ecosaude-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: SATELLITE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ecosaude-secrets
                  key: SATELLITE_API_KEY
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
